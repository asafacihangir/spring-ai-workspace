spring.application.name=skillsjar
spring.ai.openai.api-key=${OPENAI_API_KEY}
agent.skills.paths=classpath:/META-INF/skills
app.output-dir=./output
logging.level.org.springframework.ai=TRACE
# Tool/skill çağrılarının ad ad loglanmasını sustur (hangi tool çalıştırıldığını yazmasın)
logging.level.org.springframework.ai.tool=WARN
logging.level.org.springframework.ai.model.tool=WARN
